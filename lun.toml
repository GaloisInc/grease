ignore = ["./deps/**/*", "*.bat", "*.bc", "*.elf", "*.exe"]

# ---------------------------------------------------------
# haskell

[[formatter]]
name = "fourmolu"
configs = ["fourmolu.yaml"]
files = ["*.hs"]
args = "all"
check = "fourmolu --mode check"
cmd = "fourmolu --mode inplace"

[[tool]]
name = "hlint"
configs = [".hlint.yaml"]
files = ["grease*/**/*.hs"]

# ---------------------------------------------------------
# java

[[formatter]]
name = "google-java-format (ghidra-ecfs)"
cd = "ghidra-ecfs"
check = "gradle googleJavaFormatCheck"
cmd = "gradle googleJavaFormatApply"
args = "none"
files = ["./ghidra-ecfs/src/**/*.java"]

[[formatter]]
name = "google-java-format (screach)"
cd = "screach/ghidra"
check = "gradle googleJavaFormatCheck"
cmd = "gradle googleJavaFormatApply"
args = "none"
files = ["./screach/ghidra/src/**/*.java"]

[[linter]]
name = "checkstyle (ghidra-ecfs)"
cd = "ghidra-ecfs"
cmd = "gradle checkstyleJavaSources"
args = "none"
files = ["./ghidra-ecfs/src/**/*.java"]

[[linter]]
name = "checkstyle (screach)"
cd = "screach/ghidra"
cmd = "gradle checkstyleJavaSources"
args = "none"
files = ["./screach/ghidra/src/**/*.java"]

# ---------------------------------------------------------
# make

# this checks Makefile syntax, -n is a POSIX flag that means "don't run"
[[tool]]
name = "make -n"

# ---------------------------------------------------------
# markdown

[[tool]]
name = "mdlynx"

[[tool]]
name = "typos"
configs = []
files = ["doc/**/*"]

# ---------------------------------------------------------
# python

[[tool]]
name = "ruff check"
configs = []

[[tool]]
name = "ruff format"
configs = []

# ---------------------------------------------------------
# scala

[[linter]]
name = "spotless"
configs = []
cd = "ghidra-plugin"
cmd = "./gradlew spotlessCheck"
args = "none"
files = ["*.scala"]

# ---------------------------------------------------------
# shell

# this checks shell syntax, -n is a POSIX flag that means "don't run"
[[tool]]
name = "bash -n"

# ---------------------------------------------------------
# text

[[linter]]
name = "stale-todo.py"
cmd = "python3 scripts/lint/stale-todo.py"
args = "all"
files = ["**/Makefile", "*.cabal", "*.md", "*.mk", "*.project", "*.py", "*.scala", "*.sh"]

[[tool]]
name = "tagref"

[[tool]]
name = "ttlint"
# some of these have significant trailing whitespace
ignore = ["grease-exe/tests/**/*"]
